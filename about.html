    <style>
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .profile-avatar {
            width: 90px;
            height: 90px;
            background: var(--primary-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
        }
        .profile-name { font-size: 1.5rem; font-weight: 800; color: white; }
        .profile-email { color: #94a3b8; font-size: 0.9rem; margin-bottom: 8px; }
        .join-date { font-size: 0.75rem; color: #64748b; background: rgba(255,255,255,0.05); padding: 4px 12px; border-radius: 20px; }

        .menu-list { padding: 20px 15px; padding-bottom: 100px; }
        .menu-item {
            display: flex;
            align-items: center;
            background: var(--card-dark);
            padding: 16px;
            border-radius: 15px;
            margin-bottom: 12px;
            color: white;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .menu-item:active { transform: scale(0.98); background: #334155; }
        .menu-icon { font-size: 1.3rem; margin-right: 15px; width: 30px; text-align: center; }
        .menu-label { flex-grow: 1; font-weight: 600; font-size: 0.95rem; }
        .menu-arrow { color: #475569; font-size: 1.2rem; }

        .dev-badge {
            background: linear-gradient(45deg, #fbbf24, #f59e0b);
            color: black;
            font-size: 0.65rem;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }
    </style>
</head>
